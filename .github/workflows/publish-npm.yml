name: Publish to npm

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - package.json
      - pnpm-lock.yaml
      - src/**
      - tsconfig.json
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (must match package.json, e.g. 1.0.0)
        required: false
        type: string
      force:
        description: Publish even if this version already exists on npm
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve expected version
        id: version
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          echo "package=$PKG_VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "release" ]; then
            EXPECTED="${{ github.event.release.tag_name }}"
            EXPECTED="${EXPECTED#v}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            EXPECTED="${{ inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            EXPECTED="${GITHUB_REF#refs/tags/v}"
          else
            EXPECTED="$PKG_VERSION"
          fi

          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "package.json version ($PKG_VERSION) does not match expected version ($EXPECTED)"
            exit 1
          fi

          echo "expected=$EXPECTED" >> "$GITHUB_OUTPUT"

      - name: Skip if version already on npm
        id: skip
        env:
          FORCE: ${{ inputs.force }}
        run: |
          VERSION="${{ steps.version.outputs.expected }}"
          if [ "$FORCE" = "true" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if npm view "@eyueldk/cursor-cloud-agent-mcp@${VERSION}" version 2>/dev/null; then
            echo "Version ${VERSION} is already published — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.skip.outputs.publish == 'true'
        run: pnpm run build

      - name: Test
        if: steps.skip.outputs.publish == 'true'
        run: pnpm test

      - name: Publish to npm (trusted publishing)
        if: steps.skip.outputs.publish == 'true'
        run: pnpm publish --access public --provenance --no-git-checks
