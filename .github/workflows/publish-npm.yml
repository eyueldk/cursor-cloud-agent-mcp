name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (must match package.json, e.g. 1.0.0)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package version
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          if [ "${{ github.event_name }}" = "release" ]; then
            EXPECTED="${{ github.event.release.tag_name }}"
            EXPECTED="${EXPECTED#v}"
          else
            EXPECTED="${{ inputs.version }}"
          fi
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "package.json version ($PKG_VERSION) does not match expected version ($EXPECTED)"
            exit 1
          fi

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Publish to npm (trusted publishing)
        run: pnpm publish --access public --provenance --no-git-checks
